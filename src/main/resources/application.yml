spring:
    application:
        name: etudiant-backend
    jpa:
        show-sql: true
        hibernate:
            ddl-auto: update
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}

# App-specific configuration
app:
    auth:
        # Note: mobile-support is AUTO-CONFIGURED based on ENV variable (.env file)
        # ENV=prod -> mobile-support=OFF (cookies-only, better security)
        # ENV=staging/dev -> mobile-support=ON (headers+cookies, mobile testing)
        #
        # WHY auto-config? Security decisions should be centralized in .env
        # with other sensitive configs (DB, JWT secrets), not scattered
    jwt:
        # Token expiration times (in milliseconds)
        expiration:
            # Access token: 1 hour (3600000ms)
            access-token: ${JWT_EXPIRATION_MS:3600000}
            # Refresh token: 48 hours (172800000ms) par défaut
            refresh-token: ${JWT_REFRESH_EXPIRATION_MS:172800000}

        # Cookie configuration for web clients
        cookie:
            name: "token"
            # Cookie expires when browser closes (session cookie)
            max-age: -1
            # Secure in production
            secure: true
            # HttpOnly for XSS protection
            http-only: true
            # SameSite for CSRF protection
            same-site: "Lax"
    logging:
        requests:
            # Enable/disable HTTP request monitoring (always enabled by default)
            enabled: true
            # Max request body size to log (prevent huge log files)
            max-payload-length: 1000
            # Note: headers/payload are AUTO-CONFIGURED based on ENV variable:
            # ENV=prod -> headers=OFF, payload=OFF (security)
            # ENV=staging -> headers=ON, payload=OFF (auth debug)
            # ENV=dev -> headers=ON, payload=ON (full debug)

logging:
    exception-conversion-word: "%wEx{2}"
    level:
        org:
            hibernate:
                type: info
            springframework:
                web:
                    filter:
                        CommonsRequestLoggingFilter: info
        com:
            openclassrooms:
                etudiant: info

management:
    endpoints:
        web:
            exposure:
                include: "*"
